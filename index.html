<script>
document.addEventListener("DOMContentLoaded", function() {

  console.log("APP OK");

  // -------- DATOS --------
  let partidos = JSON.parse(localStorage.getItem('partidos')) || [];
  let tablas = JSON.parse(localStorage.getItem('tablas')) || [];

  let nextId = 1;

  function guardarDatos(){
    localStorage.setItem('partidos', JSON.stringify(partidos));
    localStorage.setItem('tablas', JSON.stringify(tablas));
  }

  // -------- FECHA (SIN ERROR) --------
  const fecha = document.getElementById('fecha-hoy');
  if (fecha) {
    fecha.textContent = new Date().toLocaleDateString('es-AR',{
      weekday:'long',
      year:'numeric',
      month:'long',
      day:'numeric'
    });
  }

  // -------- RENDER PARTIDOS --------
  function renderPartidos(){
    const c = document.getElementById('partidos-container');
    if (!c) return;

    if (partidos.length === 0){
      c.innerHTML = "Sin partidos";
      return;
    }

    c.innerHTML = partidos.map(p => `
      <div>
        ${p.local} vs ${p.visitante} (${p.hora})
        <button onclick="eliminarPartido(${p.id})">X</button>
      </div>
    `).join("");
  }

  // -------- RENDER TABLAS --------
  function renderTablas(){
    const c = document.getElementById('tablas-container');
    if (!c) return;

    if (tablas.length === 0){
      c.innerHTML = "Sin tablas";
      return;
    }

    c.innerHTML = tablas.map(t => `
      <div>
        <b>${t.nombre}</b><br>
        ${(t.equipos || []).map(e => `
          ${e.nombre} (${e.pts})
          <button onclick="eliminarEquipo(${t.id},${e.id})">X</button>
        `).join("<br>")}
      </div><br>
    `).join("");
  }

  // -------- FUNCIONES GLOBALES --------
  window.guardarPartido = function(){
    const local = document.getElementById('f-local')?.value;
    const visitante = document.getElementById('f-visitante')?.value;
    const hora = document.getElementById('f-hora')?.value || "20:00";

    if (!local || !visitante) return;

    partidos.push({ id: nextId++, local, visitante, hora });
    guardarDatos();
    renderPartidos();
  }

  window.eliminarPartido = function(id){
    partidos = partidos.filter(p => p.id !== id);
    guardarDatos();
    renderPartidos();
  }

  window.guardarNuevaTabla = function(){
    const nombre = document.getElementById('nt-nombre')?.value;
    if (!nombre) return;

    tablas.push({ id: nextId++, nombre, equipos: [] });
    guardarDatos();
    renderTablas();
  }

  window.guardarEquipo = function(){
    const nombre = document.getElementById('t-nombre')?.value;
    const pts = parseInt(document.getElementById('t-pts')?.value) || 0;

    if (!nombre || tablas.length === 0) return;

    tablas[0].equipos.push({ id: nextId++, nombre, pts });
    guardarDatos();
    renderTablas();
  }

  window.eliminarEquipo = function(tablaId, equipoId){
    const t = tablas.find(t => t.id === tablaId);
    if (!t) return;

    t.equipos = t.equipos.filter(e => e.id !== equipoId);
    guardarDatos();
    renderTablas();
  }

  // -------- INICIO --------
  renderPartidos();
  renderTablas();

});
</script>
