<script>
  let partidos = JSON.parse(localStorage.getItem('partidos')) || [
    { id:1, local:'Aldosivi', visitante:'Estudiantes RC', hora:'13:30', comp:'LPF', zona:'Zona B' },
    { id:2, local:'Independiente', visitante:'Racing Club', hora:'17:30', comp:'LPF', zona:'Interzonal' },
    { id:3, local:'Rosario Central', visitante:'Atlético Tucumán', hora:'21:00', comp:'LPF', zona:'Zona B' }
  ];

  let tablas = JSON.parse(localStorage.getItem('tablas')) || [
    { id:1, nombre:'Zona A', equipos:[ {id:1,nombre:'EFI',pts:23}, {id:2,nombre:'efur',pts:18} ] },
    { id:2, nombre:'Zona B', equipos:[ {id:3,nombre:'Los Tigres',pts:15}, {id:4,nombre:'Central FC',pts:12} ] }
  ];

  let editPId=null, editTablaId=null, editEId=null, renameTablaId=null, nextId=50;

  function guardarDatos(){
    localStorage.setItem('partidos', JSON.stringify(partidos));
    localStorage.setItem('tablas', JSON.stringify(tablas));
  }

 document.addEventListener("DOMContentLoaded", function() {

  // Fecha
  const fecha = document.getElementById('fecha-hoy');
  if (fecha) {
    fecha.textContent = new Date().toLocaleDateString('es-AR', {
      weekday:'long',
      year:'numeric',
      month:'long',
      day:'numeric'
    });
  }

  // Render inicial
  renderPartidos();
  renderTablas();

});
    new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function cerrar(id){ document.getElementById(id).classList.remove('active'); }
  function abrir(id){ document.getElementById(id).classList.add('active'); }

  function renderPartidos(){
    const c=document.getElementById('partidos-container');
    if(!partidos.length){ c.innerHTML='Sin partidos'; return; }
    let html='';
    partidos.forEach(p=>{
      html+=`<div>
        ${p.local} vs ${p.visitante} - ${p.hora}
        <button onclick="eliminarPartido(${p.id})">X</button>
      </div>`;
    });
    c.innerHTML=html;
  }

  function renderTablas(){
    const c=document.getElementById('tablas-container');
    if(!tablas.length){ c.innerHTML='Sin tablas'; return; }
    let html='';
    tablas.forEach(t=>{
      html+=`<div><b>${t.nombre}</b><br>`;
      t.equipos.forEach(e=>{
        html+=`${e.nombre} (${e.pts}) <button onclick="eliminarEquipo(${t.id},${e.id})">X</button><br>`;
      });
      html+='</div><br>';
    });
    c.innerHTML=html;
  }

  function guardarPartido(){
    const local=document.getElementById('f-local').value;
    const visitante=document.getElementById('f-visitante').value;
    if(!local||!visitante) return;

    partidos.push({
      id:nextId++,
      local,
      visitante,
      hora:document.getElementById('f-hora').value,
      comp:'LPF',
      zona:''
    });

    renderPartidos();
    guardarDatos();
  }

  function eliminarPartido(id){
    partidos = partidos.filter(p=>p.id!==id);
    renderPartidos();
    guardarDatos();
  }

  function guardarNuevaTabla(){
    const nombre=document.getElementById('nt-nombre').value;
    if(!nombre) return;

    tablas.push({id:nextId++, nombre, equipos:[]});
    renderTablas();
    guardarDatos();
  }

  function eliminarTabla(id){
    tablas = tablas.filter(t=>t.id!==id);
    renderTablas();
    guardarDatos();
  }

  function guardarEquipo(){
    const nombre=document.getElementById('t-nombre').value;
    const pts=parseInt(document.getElementById('t-pts').value)||0;
    if(!nombre) return;

    tablas[0].equipos.push({id:nextId++, nombre, pts});
    renderTablas();
    guardarDatos();
  }

  function eliminarEquipo(tablaId,equipoId){
    const t=tablas.find(t=>t.id===tablaId);
    t.equipos = t.equipos.filter(e=>e.id!==equipoId);
    renderTablas();
    guardarDatos();
  }

  renderPartidos();
  renderTablas();
</script>
