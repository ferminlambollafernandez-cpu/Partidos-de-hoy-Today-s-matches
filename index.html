<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partidos de Hoy — Fútbol</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f0; --card: #ffffff; --text: #111110; --muted: #777770; --hint: #aaa9a3;
    --border: rgba(0,0,0,0.1); --border-hover: rgba(0,0,0,0.22); --accent: #111110;
    --badge-bg: #efefeb; --radius: 14px; --input-bg: #f0efe9;
    --gold: #c9a84c; --silver: #8e9aaa; --bronze: #b07d52;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }

  .header { margin-bottom: 2rem; }
  .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 3px; line-height: 1; }
  .header-date { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 4px; }

  .toolbar { display: flex; gap: 10px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .btn { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 16px; border-radius: 30px; border: 1.5px solid var(--border-hover); background: var(--card); color: var(--text); cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .btn:hover { background: var(--badge-bg); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.primary:hover { opacity: 0.85; }

  .section { margin-bottom: 1.5rem; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--hint); padding-left: 2px; margin-bottom: 8px; }

  /* MATCH CARD */
  .match-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; transition: border-color 0.15s, box-shadow 0.15s; animation: fadeIn 0.3s ease both; }
  .match-card:hover { border-color: var(--border-hover); box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .team { display: flex; flex-direction: column; gap: 2px; }
  .team.right { text-align: right; align-items: flex-end; }
  .team-name { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .team-sub { font-size: 10px; color: var(--hint); text-transform: uppercase; letter-spacing: 0.5px; }
  .mid { display: flex; flex-direction: column; align-items: center; gap: 4px; flex-shrink: 0; }
  .vs-text { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); line-height: 1; }
  .hora-badge { font-size: 12px; font-weight: 600; background: var(--badge-bg); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
  .comp-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; padding: 2px 8px; border-radius: 20px; border: 1px solid var(--border); color: var(--muted); background: var(--badge-bg); }
  .card-actions { grid-column: 1 / -1; display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; border-top: 1px solid var(--border); padding-top: 8px; }
  .card-btn { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: background 0.12s; font-family: 'Barlow', sans-serif; }
  .card-btn:hover { background: var(--badge-bg); color: var(--text); }
  .card-btn.del { border-color: #e0b0ab; color: #c0392b; }
  .card-btn.del:hover { background: #ffe0de; }

  .divider { border: none; border-top: 2px solid var(--border); margin: 2rem 0; }

  /* TABLAS */
  .tablas-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; flex-wrap: wrap; gap: 8px; }
  .tablas-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }

  .tabla-block { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1.2rem; overflow: hidden; animation: fadeIn 0.3s ease both; }
  .tabla-block-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 8px; flex-wrap: wrap; }
  .tabla-block-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1.5px; }
  .tabla-block-actions { display: flex; gap: 6px; }
  .tba-btn { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'Barlow', sans-serif; transition: background 0.12s; }
  .tba-btn:hover { background: var(--badge-bg); color: var(--text); }
  .tba-btn.del { border-color: #e0b0ab; color: #c0392b; }
  .tba-btn.del:hover { background: #ffe0de; }

  table { width: 100%; border-collapse: collapse; }
  thead tr { background: var(--accent); }
  thead th { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1.5px; color: #fff; padding: 9px 14px; text-align: left; font-weight: 400; }
  thead th.c { text-align: center; width: 44px; }
  thead th.pts { text-align: center; width: 60px; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--badge-bg); }
  tbody td { padding: 10px 14px; font-size: 15px; }
  tbody td.c { text-align: center; }
  tbody td.equipo { font-weight: 600; }
  tbody td.pts { text-align: center; font-weight: 700; font-size: 20px; font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
  .pos-icon { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 11px; font-weight: 700; font-family: 'Barlow', sans-serif; }
  .pos-1 { background: #fff3cd; color: var(--gold); }
  .pos-2 { background: #eef0f2; color: var(--silver); }
  .pos-3 { background: #f5ece4; color: var(--bronze); }
  .pos-n { background: var(--badge-bg); color: var(--muted); }
  .td-acts { display: flex; gap: 5px; justify-content: flex-end; }
  .tb-btn { font-size: 11px; padding: 3px 10px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'Barlow', sans-serif; font-weight: 600; transition: background 0.12s; }
  .tb-btn:hover { background: var(--badge-bg); color: var(--text); }
  .tb-btn.del { border-color: #e0b0ab; color: #c0392b; }
  .tb-btn.del:hover { background: #ffe0de; }

  /* MODAL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.active { display: flex; }
  .modal { background: var(--card); border-radius: var(--radius); padding: 1.5rem; width: 100%; max-width: 460px; border: 1px solid var(--border); animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px; margin-bottom: 1.2rem; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
  .field input, .field select { width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--input-bg); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; outline: none; transition: border-color 0.15s; }
  .field input:focus, .field select:focus { border-color: var(--border-hover); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.2rem; }

  .empty { text-align: center; padding: 2rem 1rem; color: var(--hint); font-size: 14px; border: 1.5px dashed var(--border); border-radius: var(--radius); }
  .empty span { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--border-hover); margin-bottom: 6px; }

  /* SELECT estilo */
  select option { background: #fff; color: #111; }

  @media (max-width: 480px) {
    .header-title { font-size: 36px; }
    .team-name { font-size: 14px; }
    .match-card { padding: 12px 14px; gap: 8px; }
    .two-col { grid-template-columns: 1fr; }
    .toolbar { gap: 6px; }
    .btn { font-size: 12px; padding: 7px 12px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">⚽ Partidos de hoy</div>
    <div class="header-date" id="fecha-hoy"></div>
  </div>

  <!-- TOOLBAR GLOBAL -->
  <div class="toolbar">
    <button class="btn primary" onclick="abrirModalPartido()">+ Partido</button>
    <button class="btn primary" onclick="abrirModalNuevaTabla()">+ Nueva tabla</button>
    <button class="btn primary" onclick="abrirModalEquipo()">+ Equipo a tabla</button>
    <button class="btn" onclick="exportarHTML()">Descargar HTML</button>
  </div>

  <!-- PARTIDOS -->
  <div id="partidos-container"></div>

  <hr class="divider">

  <!-- TABLAS -->
  <div class="tablas-header">
    <div class="tablas-title">Tablas de posiciones</div>
  </div>
  <div id="tablas-container"></div>

</div>

<!-- MODAL PARTIDO -->
<div class="overlay" id="overlay-partido">
  <div class="modal">
    <h2 id="mp-title">Nuevo partido</h2>
    <div class="two-col">
      <div class="field"><label>Equipo local</label><input id="f-local" type="text" placeholder="Ej: River Plate"></div>
      <div class="field"><label>Equipo visitante</label><input id="f-visitante" type="text" placeholder="Ej: Boca Juniors"></div>
    </div>
    <div class="two-col">
      <div class="field"><label>Hora</label><input id="f-hora" type="time" value="20:00"></div>
      <div class="field"><label>Competición</label><input id="f-comp" type="text" placeholder="LPF"></div>
    </div>
    <div class="field"><label>Zona / Detalle (opcional)</label><input id="f-zona" type="text" placeholder="Zona A, Interzonal..."></div>
    <div class="modal-actions">
      <button class="btn" onclick="cerrar('overlay-partido')">Cancelar</button>
      <button class="btn primary" onclick="guardarPartido()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVA TABLA -->
<div class="overlay" id="overlay-nueva-tabla">
  <div class="modal">
    <h2>Nueva tabla</h2>
    <div class="field"><label>Nombre de la tabla</label><input id="nt-nombre" type="text" placeholder="Ej: Zona A, Liga local, Grupo 1..."></div>
    <div class="modal-actions">
      <button class="btn" onclick="cerrar('overlay-nueva-tabla')">Cancelar</button>
      <button class="btn primary" onclick="guardarNuevaTabla()">Crear tabla</button>
    </div>
  </div>
</div>

<!-- MODAL RENOMBRAR TABLA -->
<div class="overlay" id="overlay-rename-tabla">
  <div class="modal">
    <h2>Renombrar tabla</h2>
    <div class="field"><label>Nuevo nombre</label><input id="rt-nombre" type="text"></div>
    <div class="modal-actions">
      <button class="btn" onclick="cerrar('overlay-rename-tabla')">Cancelar</button>
      <button class="btn primary" onclick="guardarRename()">Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL EQUIPO (GLOBAL con selector de tabla) -->
<div class="overlay" id="overlay-equipo">
  <div class="modal">
    <h2 id="me-title">Agregar equipo a tabla</h2>
    <div class="field">
      <label>¿A qué tabla?</label>
      <select id="t-tabla"></select>
    </div>
    <div class="field"><label>Nombre del equipo</label><input id="t-nombre" type="text" placeholder="Ej: EFI"></div>
    <div class="field"><label>Puntos</label><input id="t-pts" type="number" min="0" placeholder="Ej: 23"></div>
    <div class="modal-actions">
      <button class="btn" onclick="cerrar('overlay-equipo')">Cancelar</button>
      <button class="btn primary" onclick="guardarEquipo()">Guardar</button>
    </div>
  </div>
</div>

<script>
  let partidos = [
    { id:1, local:'Aldosivi', visitante:'Estudiantes RC', hora:'13:30', comp:'LPF', zona:'Zona B' },
    { id:2, local:'Independiente', visitante:'Racing Club', hora:'17:30', comp:'LPF', zona:'Interzonal' },
    { id:3, local:'Rosario Central', visitante:'Atlético Tucumán', hora:'21:00', comp:'LPF', zona:'Zona B' }
  ];
  let tablas = [
    { id:1, nombre:'Zona A', equipos:[ {id:1,nombre:'EFI',pts:23}, {id:2,nombre:'efur',pts:18} ] },
    { id:2, nombre:'Zona B', equipos:[ {id:3,nombre:'Los Tigres',pts:15}, {id:4,nombre:'Central FC',pts:12} ] }
  ];
  let editPId=null, editTablaId=null, editEId=null, renameTablaId=null, nextId=50;

  document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function cerrar(id){ document.getElementById(id).classList.remove('active'); }
  function abrir(id){ document.getElementById(id).classList.add('active'); }

  // ---- RENDER PARTIDOS ----
  function renderPartidos(){
    const c=document.getElementById('partidos-container');
    if(!partidos.length){ c.innerHTML=`<div class="empty"><span>Sin partidos</span>Usá "+ Partido" para agregar.</div>`; return; }
    const grupos={};
    partidos.forEach(p=>{ const k=p.comp||'Sin comp'; if(!grupos[k]) grupos[k]=[]; grupos[k].push(p); });
    let html='';
    for(const [comp,items] of Object.entries(grupos)){
      items.sort((a,b)=>a.hora.localeCompare(b.hora));
      html+=`<div class="section"><div class="section-label">${esc(comp)}</div>`;
      items.forEach(p=>{
        html+=`<div class="match-card">
          <div class="team"><div class="team-name">${esc(p.local)}</div><div class="team-sub">Local${p.zona?' · '+esc(p.zona):''}</div></div>
          <div class="mid"><div class="hora-badge">${esc(p.hora)}</div><div class="vs-text">vs</div><div class="comp-badge">${esc(p.comp)}</div></div>
          <div class="team right"><div class="team-name">${esc(p.visitante)}</div><div class="team-sub">Visitante${p.zona?' · '+esc(p.zona):''}</div></div>
          <div class="card-actions">
            <button class="card-btn" onclick="abrirModalPartido(${p.id})">✏️ Editar</button>
            <button class="card-btn del" onclick="eliminarPartido(${p.id})">🗑 Eliminar</button>
          </div>
        </div>`;
      });
      html+=`</div>`;
    }
    c.innerHTML=html;
  }

  // ---- RENDER TABLAS ----
  function renderTablas(){
    const c=document.getElementById('tablas-container');
    if(!tablas.length){ c.innerHTML=`<div class="empty"><span>Sin tablas</span>Usá "+ Nueva tabla" para crear una.</div>`; return; }
    const cls=['pos-1','pos-2','pos-3'];
    let html='';
    tablas.forEach(t=>{
      const sorted=[...t.equipos].sort((a,b)=>b.pts-a.pts);
      const rows=sorted.length
        ? sorted.map((eq,i)=>`<tr>
            <td class="c"><span class="pos-icon ${i<3?cls[i]:'pos-n'}">${i+1}</span></td>
            <td class="equipo">${esc(eq.nombre)}</td>
            <td class="pts">${eq.pts}</td>
            <td><div class="td-acts">
              <button class="tb-btn" onclick="abrirModalEquipoEditar(${t.id},${eq.id})">✏️</button>
              <button class="tb-btn del" onclick="eliminarEquipo(${t.id},${eq.id})">🗑</button>
            </div></td>
          </tr>`).join('')
        : `<tr><td colspan="4" style="padding:16px;text-align:center;color:var(--hint);font-size:13px;">Sin equipos — usá "+ Equipo a tabla" para agregar</td></tr>`;

      html+=`<div class="tabla-block">
        <div class="tabla-block-header">
          <div class="tabla-block-name">${esc(t.nombre)}</div>
          <div class="tabla-block-actions">
            <button class="tba-btn" onclick="abrirModalRename(${t.id})">✏️ Renombrar</button>
            <button class="tba-btn del" onclick="eliminarTabla(${t.id})">🗑 Borrar</button>
          </div>
        </div>
        <table>
          <thead><tr><th class="c">#</th><th>Equipo</th><th class="pts">PTS</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    });
    c.innerHTML=html;
  }

  // ---- PARTIDO ----
  function abrirModalPartido(id){
    editPId=id||null;
    document.getElementById('mp-title').textContent=id?'Editar partido':'Nuevo partido';
    const p=id?partidos.find(x=>x.id===id):null;
    document.getElementById('f-local').value=p?p.local:'';
    document.getElementById('f-visitante').value=p?p.visitante:'';
    document.getElementById('f-hora').value=p?p.hora:'20:00';
    document.getElementById('f-comp').value=p?p.comp:'LPF';
    document.getElementById('f-zona').value=p?p.zona||'':'';
    abrir('overlay-partido');
    setTimeout(()=>document.getElementById('f-local').focus(),80);
  }
  function guardarPartido(){
    const local=document.getElementById('f-local').value.trim();
    const visitante=document.getElementById('f-visitante').value.trim();
    if(!local||!visitante){ document.getElementById('f-local').focus(); return; }
    const obj={id:editPId||nextId++,local,visitante,hora:document.getElementById('f-hora').value,comp:document.getElementById('f-comp').value.trim()||'LPF',zona:document.getElementById('f-zona').value.trim()};
    if(editPId){ const i=partidos.findIndex(x=>x.id===editPId); partidos[i]=obj; } else { partidos.push(obj); }
    cerrar('overlay-partido'); editPId=null; renderPartidos();
  }
  function eliminarPartido(id){ if(!confirm('¿Eliminar partido?')) return; partidos=partidos.filter(p=>p.id!==id); renderPartidos(); }

  // ---- NUEVA TABLA ----
  function abrirModalNuevaTabla(){ document.getElementById('nt-nombre').value=''; abrir('overlay-nueva-tabla'); setTimeout(()=>document.getElementById('nt-nombre').focus(),80); }
  function guardarNuevaTabla(){
    const nombre=document.getElementById('nt-nombre').value.trim();
    if(!nombre){ document.getElementById('nt-nombre').focus(); return; }
    tablas.push({id:nextId++,nombre,equipos:[]});
    cerrar('overlay-nueva-tabla'); renderTablas();
  }

  // ---- RENOMBRAR TABLA ----
  function abrirModalRename(tablaId){ renameTablaId=tablaId; const t=tablas.find(x=>x.id===tablaId); document.getElementById('rt-nombre').value=t.nombre; abrir('overlay-rename-tabla'); setTimeout(()=>document.getElementById('rt-nombre').focus(),80); }
  function guardarRename(){ const nombre=document.getElementById('rt-nombre').value.trim(); if(!nombre) return; const t=tablas.find(x=>x.id===renameTablaId); if(t) t.nombre=nombre; cerrar('overlay-rename-tabla'); renameTablaId=null; renderTablas(); }
  function eliminarTabla(id){ if(!confirm('¿Eliminar esta tabla y todos sus equipos?')) return; tablas=tablas.filter(t=>t.id!==id); renderTablas(); }

  // ---- EQUIPO GLOBAL ----
  function poblarSelectTablas(seleccionadoId){
    const sel=document.getElementById('t-tabla');
    sel.innerHTML='';
    if(!tablas.length){ sel.innerHTML='<option value="">— Primero creá una tabla —</option>'; return; }
    tablas.forEach(t=>{
      const opt=document.createElement('option');
      opt.value=t.id;
      opt.textContent=t.nombre;
      if(seleccionadoId && t.id===seleccionadoId) opt.selected=true;
      sel.appendChild(opt);
    });
  }

  function abrirModalEquipo(){
    // Botón global: nueva entrada
    editTablaId=null; editEId=null;
    document.getElementById('me-title').textContent='Agregar equipo a tabla';
    poblarSelectTablas(null);
    document.getElementById('t-nombre').value='';
    document.getElementById('t-pts').value='';
    document.getElementById('t-tabla').disabled=false;
    abrir('overlay-equipo');
    setTimeout(()=>document.getElementById('t-nombre').focus(),80);
  }

  function abrirModalEquipoEditar(tablaId,equipoId){
    // Editar equipo existente: fija la tabla
    editTablaId=tablaId; editEId=equipoId;
    document.getElementById('me-title').textContent='Editar equipo';
    poblarSelectTablas(tablaId);
    document.getElementById('t-tabla').disabled=true; // no se puede cambiar de tabla al editar
    const t=tablas.find(x=>x.id===tablaId);
    const eq=t.equipos.find(x=>x.id===equipoId);
    document.getElementById('t-nombre').value=eq.nombre;
    document.getElementById('t-pts').value=eq.pts;
    abrir('overlay-equipo');
    setTimeout(()=>document.getElementById('t-nombre').focus(),80);
  }

  function guardarEquipo(){
    const tablaId=parseInt(document.getElementById('t-tabla').value);
    const nombre=document.getElementById('t-nombre').value.trim();
    const pts=parseInt(document.getElementById('t-pts').value)||0;
    if(!tablaId||!nombre){ document.getElementById('t-nombre').focus(); return; }
    const t=tablas.find(x=>x.id===tablaId);
    if(!t) return;
    const obj={id:editEId||nextId++,nombre,pts};
    if(editEId){ const i=t.equipos.findIndex(x=>x.id===editEId); t.equipos[i]=obj; }
    else { t.equipos.push(obj); }
    cerrar('overlay-equipo'); editTablaId=null; editEId=null; renderTablas();
  }
  function eliminarEquipo(tablaId,equipoId){ if(!confirm('¿Eliminar equipo?')) return; const t=tablas.find(x=>x.id===tablaId); t.equipos=t.equipos.filter(e=>e.id!==equipoId); renderTablas(); }

  // Cerrar modales
  document.querySelectorAll('.overlay').forEach(o=>{ o.addEventListener('click',function(e){ if(e.target===this) this.classList.remove('active'); }); });
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('active')); });

  function exportarHTML(){
    const blob=new Blob([document.documentElement.outerHTML],{type:'text/html'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='partidos-hoy.html'; a.click();
  }

  renderPartidos();
  renderTablas();
</script>
</body>
</html>
