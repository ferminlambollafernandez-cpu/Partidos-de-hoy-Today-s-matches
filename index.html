<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partidos de Hoy — Fútbol</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --card: #ffffff;
    --text: #111110;
    --muted: #777770;
    --hint: #aaa9a3;
    --border: rgba(0,0,0,0.1);
    --border-hover: rgba(0,0,0,0.22);
    --accent: #111110;
    --badge-bg: #efefeb;
    --radius: 14px;
    --input-bg: #f0efe9;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
  }

  /* HEADER */
  .header { margin-bottom: 2rem; }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 3px;
    color: var(--text);
    line-height: 1;
  }
  .header-date {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .btn {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 8px 16px;
    border-radius: 30px;
    border: 1.5px solid var(--border-hover);
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:hover { background: var(--badge-bg); }
  .btn:active { transform: scale(0.97); }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn.primary:hover { opacity: 0.85; }
  .btn.danger {
    border-color: #c0392b;
    color: #c0392b;
    background: #fff5f5;
  }
  .btn.danger:hover { background: #ffe0de; }

  /* SECTION */
  .section { margin-bottom: 1.5rem; }
  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--hint);
    margin-bottom: 8px;
    padding-left: 2px;
  }

  /* MATCH CARD */
  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 12px;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: fadeIn 0.3s ease both;
  }
  .match-card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .team { display: flex; flex-direction: column; gap: 2px; }
  .team.right { text-align: right; align-items: flex-end; }

  .team-name {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .team-sub {
    font-size: 10px;
    color: var(--hint);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .mid {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .vs-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--muted);
    line-height: 1;
  }
  .hora-badge {
    font-size: 12px;
    font-weight: 600;
    background: var(--badge-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
    color: var(--text);
    white-space: nowrap;
  }
  .comp-badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--muted);
    background: var(--badge-bg);
    white-space: nowrap;
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* card action btns */
  .card-actions {
    grid-column: 1 / -1;
    display: flex;
    gap: 6px;
    justify-content: flex-end;
    margin-top: 6px;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .card-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.12s;
  }
  .card-btn:hover { background: var(--badge-bg); color: var(--text); }
  .card-btn.del { border-color: #e0b0ab; color: #c0392b; }
  .card-btn.del:hover { background: #ffe0de; }

  /* MODAL OVERLAY */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .overlay.active { display: flex; }

  .modal {
    background: var(--card);
    border-radius: var(--radius);
    padding: 1.5rem;
    width: 100%;
    max-width: 460px;
    border: 1px solid var(--border);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
    margin-bottom: 1.2rem;
    color: var(--text);
  }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .field input, .field select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--border-hover); }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.2rem; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--hint);
    font-size: 14px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
  }
  .empty span {
    display: block;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--border-hover);
    margin-bottom: 6px;
  }

  /* SECTION HEADER ROW */
  .sec-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .sec-row .section-label { margin-bottom: 0; }

  @media (max-width: 480px) {
    .header-title { font-size: 36px; }
    .team-name { font-size: 14px; }
    .match-card { padding: 12px 14px; gap: 8px; }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="header-title">⚽ Partidos de hoy</div>
    <div class="header-date" id="fecha-hoy"></div>
  </div>

  <div class="toolbar">
    <button class="btn primary" onclick="abrirModal()">+ Agregar partido</button>
    <button class="btn" onclick="exportarHTML()">Descargar HTML</button>
  </div>

  <div id="partidos-container"></div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modal-title">Nuevo partido</h2>
    <div class="two-col">
      <div class="field">
        <label>Equipo local</label>
        <input id="f-local" type="text" placeholder="Ej: River Plate">
      </div>
      <div class="field">
        <label>Equipo visitante</label>
        <input id="f-visitante" type="text" placeholder="Ej: Boca Juniors">
      </div>
    </div>
    <div class="two-col">
      <div class="field">
        <label>Hora</label>
        <input id="f-hora" type="time" value="20:00">
      </div>
      <div class="field">
        <label>Competición</label>
        <input id="f-comp" type="text" placeholder="Ej: LPF, Copa ARG">
      </div>
    </div>
    <div class="field">
      <label>Zona / Detalle (opcional)</label>
      <input id="f-zona" type="text" placeholder="Ej: Zona A, Interzonal, Octavos">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="cerrarModal()">Cancelar</button>
      <button class="btn primary" onclick="guardarPartido()">Guardar</button>
    </div>
  </div>
</div>

<script>
  // Datos iniciales
  let partidos = [
    { id: 1, local: 'Aldosivi', visitante: 'Estudiantes RC', hora: '13:30', comp: 'LPF', zona: 'Zona B' },
    { id: 2, local: 'Independiente', visitante: 'Racing Club', hora: '17:30', comp: 'LPF', zona: 'Interzonal' },
    { id: 3, local: 'Rosario Central', visitante: 'Atlético Tucumán', hora: '21:00', comp: 'LPF', zona: 'Zona B' }
  ];
  let editandoId = null;
  let nextId = 10;

  // Fecha de hoy
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('fecha-hoy').textContent = new Date().toLocaleDateString('es-AR', opts);

  function render() {
    const container = document.getElementById('partidos-container');

    if (partidos.length === 0) {
      container.innerHTML = `<div class="empty"><span>Sin partidos</span>Agregá un partido con el botón de arriba.</div>`;
      return;
    }

    // Agrupar por competición
    const grupos = {};
    partidos.forEach(p => {
      const key = p.comp || 'Sin competición';
      if (!grupos[key]) grupos[key] = [];
      grupos[key].push(p);
    });

    let html = '';
    for (const [comp, items] of Object.entries(grupos)) {
      // Ordenar por hora
      items.sort((a, b) => a.hora.localeCompare(b.hora));
      html += `<div class="section">
        <div class="sec-row">
          <div class="section-label">${comp}</div>
        </div>`;
      items.forEach(p => {
        html += `
        <div class="match-card" id="card-${p.id}">
          <div class="team">
            <div class="team-name">${escHtml(p.local)}</div>
            <div class="team-sub">Local${p.zona ? ' · ' + escHtml(p.zona) : ''}</div>
          </div>
          <div class="mid">
            <div class="hora-badge">${escHtml(p.hora)}</div>
            <div class="vs-text">vs</div>
            <div class="comp-badge">${escHtml(p.comp)}</div>
          </div>
          <div class="team right">
            <div class="team-name">${escHtml(p.visitante)}</div>
            <div class="team-sub">Visitante${p.zona ? ' · ' + escHtml(p.zona) : ''}</div>
          </div>
          <div class="card-actions">
            <button class="card-btn" onclick="editarPartido(${p.id})">✏️ Editar</button>
            <button class="card-btn del" onclick="eliminarPartido(${p.id})">🗑 Eliminar</button>
          </div>
        </div>`;
      });
      html += `</div>`;
    }

    container.innerHTML = html;
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function abrirModal(id) {
    editandoId = id || null;
    document.getElementById('modal-title').textContent = id ? 'Editar partido' : 'Nuevo partido';
    if (id) {
      const p = partidos.find(x => x.id === id);
      document.getElementById('f-local').value = p.local;
      document.getElementById('f-visitante').value = p.visitante;
      document.getElementById('f-hora').value = p.hora;
      document.getElementById('f-comp').value = p.comp;
      document.getElementById('f-zona').value = p.zona || '';
    } else {
      document.getElementById('f-local').value = '';
      document.getElementById('f-visitante').value = '';
      document.getElementById('f-hora').value = '20:00';
      document.getElementById('f-comp').value = 'LPF';
      document.getElementById('f-zona').value = '';
    }
    document.getElementById('overlay').classList.add('active');
    setTimeout(() => document.getElementById('f-local').focus(), 100);
  }

  function cerrarModal() {
    document.getElementById('overlay').classList.remove('active');
    editandoId = null;
  }

  function guardarPartido() {
    const local = document.getElementById('f-local').value.trim();
    const visitante = document.getElementById('f-visitante').value.trim();
    const hora = document.getElementById('f-hora').value;
    const comp = document.getElementById('f-comp').value.trim() || 'LPF';
    const zona = document.getElementById('f-zona').value.trim();

    if (!local || !visitante) {
      document.getElementById('f-local').focus();
      return;
    }

    if (editandoId) {
      const idx = partidos.findIndex(x => x.id === editandoId);
      partidos[idx] = { id: editandoId, local, visitante, hora, comp, zona };
    } else {
      partidos.push({ id: nextId++, local, visitante, hora, comp, zona });
    }

    cerrarModal();
    render();
  }

  function editarPartido(id) { abrirModal(id); }

  function eliminarPartido(id) {
    if (!confirm('¿Eliminar este partido?')) return;
    partidos = partidos.filter(p => p.id !== id);
    render();
  }

  // Cerrar overlay al hacer click afuera
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) cerrarModal();
  });

  // Enter para guardar
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && document.getElementById('overlay').classList.contains('active')) {
      guardarPartido();
    }
    if (e.key === 'Escape') cerrarModal();
  });

  function exportarHTML() {
    const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'partidos-hoy.html';
    a.click();
  }

  render();
</script>
</body>
</html>
